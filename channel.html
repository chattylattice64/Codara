<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; overflow-x: hidden; }

.sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 240px; background: #131313; border-right: 1px solid #1f1f1f; padding: 20px 12px 20px; overflow-y: auto; z-index: 150; transition: transform 0.3s ease; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
.sidebar .logo { display: flex; align-items: center; gap: 10px; font-size: 34px; font-weight: 800; padding: 10px 12px; color: #ffffff; text-decoration: none; border-radius: 8px; margin-bottom: 12px; }
.sidebar .logo .logo-icon { width: 56px; height: 56px; border-radius: 8px; background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.sidebar .logo:hover { background: rgba(0, 31, 63, 0.09); }
.logo-icon { width: 48px; height: 48px; background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
.logo-icon::before { content: ''; }
.sidebar-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; color: #b0b0b0; text-decoration: none; border-radius: 8px; transition: all 0.2s; cursor: pointer; margin-bottom: 4px; }
.sidebar-item:hover { background: #1f1f1f; color: #ffffff; }
.sidebar-item.active { background: #001f3f; color: #ffffff; }
.sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-item-text { font-size: 14px; font-weight: 500; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section-title { padding: 8px 16px; font-size: 12px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-divider { height: 1px; background: #1f1f1f; margin: 12px 0; }

.navbar { background: #131313; padding: 9px 40px 9px 280px; display: flex; align-items: center; justify-content: flex-end; gap: 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1f1f1f; min-height: 70px; }
.search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; max-width: 700px; padding: 0 20px; }
.search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #6b6b6b; pointer-events: none; }
.search-input { width: 100%; padding: 10px 16px 10px 44px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; color: #ffffff; font-size: 14px; transition: all 0.2s; }
.search-input:focus { outline: none; border-color: #001f3f; background: #252525; }
.search-input::placeholder { color: #6b6b6b; }
.navbar::before { content: ''; flex: 1; }
.nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; position: relative; z-index: 10; }

.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.btn-secondary { background: transparent; color: #ffffff; border: 1px solid #3a3a3a; }
.btn-secondary:hover { background: #1f1f1f; }
.btn-primary { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); color: white; }
.btn-primary:hover { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); transform: translateY(-1px); }
.btn-sm { padding: 8px 18px; font-size: 13px; }
.btn-subscribed { background: #1f1f1f; color: #b0b0b0; border: 1px solid #2a2a2a; }
.btn-subscribed:hover { background: rgba(239,68,68,0.1); color: #f87171; border-color: #3a1a1a; }

.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; transition: transform 0.2s; overflow: hidden; }
.user-avatar:hover { transform: scale(1.05); }
.user-menu { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s; z-index: 1000; }
.dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown-item { padding: 12px 16px; color: #b0b0b0; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-size: 14px; }
.dropdown-item:hover { background: #2a2a2a; color: #ffffff; }
.dropdown-divider { height: 1px; background: #2a2a2a; margin: 4px 0; }

.main-content { margin-left: 240px; min-height: 100vh; }
.sidebar-toggle { background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; cursor: pointer; display: none; transition: all 0.2s; flex-shrink: 0; }
.sidebar-toggle:hover { background: #2a2a2a; }
.sidebar-toggle svg { width: 20px; height: 20px; color: #ffffff; }

/* Channel header */
.channel-header { padding: 32px 40px 0; }
.channel-hero { display: flex; align-items: flex-end; gap: 24px; padding-bottom: 24px; border-bottom: 1px solid #1f1f1f; flex-wrap: wrap; }
.channel-avatar-wrap { position: relative; flex-shrink: 0; }
.channel-avatar { width: 88px; height: 88px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0; }
.channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
.edit-avatar-btn { position: absolute; bottom: 0; right: 0; background: #1f1f1f; border: 2px solid #0a0a0a; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; color: #b0b0b0; }
.edit-avatar-btn:hover { background: #2a2a2a; color: #fff; }
.edit-avatar-btn svg { width: 13px; height: 13px; }

.channel-info { flex: 1; min-width: 0; }
.channel-name { font-size: 24px; font-weight: 700; color: #ffffff; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
.channel-name-edit { background: transparent; border: none; border-bottom: 1px solid #001f3f; color: #ffffff; font-size: 24px; font-weight: 700; outline: none; padding: 0 0 2px; min-width: 200px; }
.channel-handle { font-size: 14px; color: #6b6b6b; margin-bottom: 8px; }
.channel-stats { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.channel-stat { font-size: 13px; color: #7a7a7a; }
.channel-stat strong { color: #c0c0c0; font-weight: 600; }

.channel-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }

/* Edit name inline */
.edit-name-btn { background: transparent; border: none; color: #6b6b6b; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; }
.edit-name-btn:hover { color: #ffffff; background: #1f1f1f; }
.edit-name-btn svg { width: 15px; height: 15px; }
.edit-name-actions { display: flex; gap: 6px; align-items: center; }
.save-name-btn { background: #001f3f; color: white; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.save-name-btn:hover { background: #001f3f; }
.cancel-name-btn { background: transparent; color: #6b6b6b; border: 1px solid #2a2a2a; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.cancel-name-btn:hover { color: #fff; background: #1f1f1f; }

/* Tabs */
.channel-tabs { display: flex; gap: 0; padding: 0 40px; border-bottom: 1px solid #1f1f1f; margin-top: 0; }
.channel-tab { padding: 14px 20px; font-size: 14px; font-weight: 500; color: #6b6b6b; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
.channel-tab:hover { color: #ffffff; }
.channel-tab.active { color: #ffffff; border-bottom-color: #001f3f; }

/* Videos grid */
.channel-body { padding: 28px 40px; }
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
.video-card { background: #111111; border-radius: 10px; overflow: hidden; transition: transform 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.video-card:hover { transform: translateY(-3px); background: #161616; }
.card-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a1a; overflow: hidden; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #2a2a2a; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); }
.card-info { padding: 10px 12px 12px; }
    .card-title { font-size: 13px; font-weight: 500; color: #f0f0f0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
.card-meta { font-size: 12px; color: #5a5a5a; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { background: #111111; border-radius: 10px; overflow: hidden; }
.skeleton-thumb { width: 100%; aspect-ratio: 16/9; }
.skeleton-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 7px; }

/* State */
.state-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 14px; }
.state-icon { width: 48px; height: 48px; color: #2a2a2a; }
.state-title { font-size: 16px; font-weight: 600; color: #6b6b6b; }
.state-sub { font-size: 13px; color: #4a4a4a; max-width: 280px; line-height: 1.5; }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1f1f1f; border: 1px solid #2a2a2a; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap; }

/* Hidden file input */
#avatarFileInput { display: none; }

/* Upload CTA (own channel, no videos) */
.upload-cta { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 60px 20px; text-align: center; }
.upload-cta svg { width: 52px; height: 52px; color: #2a2a2a; }
.upload-cta-title { font-size: 16px; font-weight: 600; color: #6b6b6b; }
.upload-cta-sub { font-size: 13px; color: #4a4a4a; max-width: 260px; }

/* Responsive */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .main-content { margin-left: 0; }
    .navbar { padding: 16px 20px; justify-content: flex-start; gap: 12px; }
    .search-container { position: relative; left: auto; transform: none; flex: 1; max-width: none; padding: 0; margin-left: 0; }
    .search-icon { left: 16px; }
    .navbar::before { display: none; }
    .channel-header { padding: 20px 20px 0; }
    .channel-tabs { padding: 0 20px; }
    .channel-body { padding: 20px; }
}
@media (max-width: 640px) {
    .channel-hero { flex-direction: column; align-items: flex-start; gap: 16px; }
    .channel-actions { margin-left: 0; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
}
</style>

<script type="module">
const { supabase } = await import('./JS/supabase.js');

// ── URL params ────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const profileUserId = params.get('userId'); // if visiting someone else's channel

let currentUser = null;
let isOwnChannel = false;
let channelProfile = null; // profile data
let subscriberCount = 0;
let isSubscribed = false;
let editingName = false;

// ── Helpers ───────────────────────────────────────────────────
function getUserInitials(text) { return text?.trim().charAt(0).toUpperCase() || '?'; }
function getDisplayName(user) {
    if (user.user_metadata?.full_name) return user.user_metadata.full_name;
    if (user.user_metadata?.name) return user.user_metadata.name;
    if (user.email) { const n = user.email.split('@')[0]; return n.charAt(0).toUpperCase() + n.slice(1); }
    return 'User';
}
function formatViews(n) {
    if (!n) return '0';
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M';
    if (n >= 1_000) return (n/1_000).toFixed(1).replace(/\.0$/,'') + 'K';
    return String(n);
}
function formatTimeAgo(str) {
    if (!str) return '';
    const s = Math.floor((Date.now() - new Date(str)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + ' min ago';
    if (s < 86400) return Math.floor(s/3600) + ' hr ago';
    if (s < 2592000) return Math.floor(s/86400) + ' days ago';
    if (s < 31536000) return Math.floor(s/2592000) + ' mo ago';
    return Math.floor(s/31536000) + ' yr ago';
}
function formatSubs(n) {
    if (!n) return '0 subscribers';
    if (n === 1) return '1 subscriber';
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M subscribers';
    if (n >= 1_000) return (n/1_000).toFixed(1).replace(/\.0$/,'') + 'K subscribers';
    return n + ' subscribers';
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── Nav auth ──────────────────────────────────────────────────
function showLoggedInNav(user) {
    const navRight = document.getElementById('navRight');
    const displayName = getDisplayName(user);
    const avatarUrl = user.user_metadata?.avatar_url;
    const avatarHTML = avatarUrl
        ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : getUserInitials(displayName);
    navRight.innerHTML = `
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">${avatarHTML}</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="channel.html" class="dropdown-item">Your Channel</a>
                <a href="settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="logoutBtn">Log out</button>
            </div>
        </div>`;
    document.getElementById('userAvatar')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('dropdownMenu').classList.toggle('show'); });
    document.addEventListener('click', () => document.getElementById('dropdownMenu')?.classList.remove('show'));
    document.getElementById('dropdownMenu')?.addEventListener('click', e => e.stopPropagation());
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.reload(); });
}

function showLoggedOutNav() {
    document.getElementById('navRight').innerHTML = `<a href="login.html" class="btn btn-secondary">Log in</a><a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>`;
}

// ── Sidebar ───────────────────────────────────────────────────
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebar = document.getElementById('sidebar');
if (sidebarToggle) {
    sidebarToggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', e => { if (window.innerWidth <= 1024 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) sidebar.classList.remove('open'); });
    sidebar.addEventListener('click', e => e.stopPropagation());
}

// ── Render channel header ─────────────────────────────────────
function renderChannelHeader(profile) {
    const avatarEl = document.getElementById('channelAvatar');
    const nameWrap = document.getElementById('channelNameWrap');
    const handleEl = document.getElementById('channelHandle');
    const statsEl = document.getElementById('channelStats');
    const actionsEl = document.getElementById('channelActions');

    // Avatar
    if (profile.avatar_url) {
        avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="${profile.username}">`;
    } else {
        avatarEl.textContent = getUserInitials(profile.username);
    }

    // Edit avatar button (own channel only)
    if (isOwnChannel) {
        const avatarWrap = document.querySelector('.channel-avatar-wrap');
        if (!avatarWrap.querySelector('.edit-avatar-btn')) {
            const editAvatarBtn = document.createElement('button');
            editAvatarBtn.className = 'edit-avatar-btn';
            editAvatarBtn.title = 'Change avatar';
            editAvatarBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`;
            editAvatarBtn.addEventListener('click', () => document.getElementById('avatarFileInput').click());
            avatarWrap.appendChild(editAvatarBtn);
        }
    }

    // Name
    if (isOwnChannel) {
        nameWrap.innerHTML = `
            <span id="channelNameText">${profile.username || 'Your Channel'}</span>
            <button class="edit-name-btn" id="editNameBtn" title="Edit name">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>`;
        document.getElementById('editNameBtn').addEventListener('click', startEditName);
    } else {
        nameWrap.innerHTML = `<span id="channelNameText">${profile.username || 'Channel'}</span>`;
    }

    // Handle
    handleEl.textContent = profile.username ? `@${profile.username.toLowerCase().replace(/\s+/g, '')}` : '';

    // Stats
    statsEl.innerHTML = `
        <span class="channel-stat"><strong>${formatSubs(subscriberCount)}</strong></span>
    `;

    // Actions
    if (isOwnChannel) {
        actionsEl.innerHTML = `<a href="yourvideos.html" class="btn btn-secondary btn-sm">Manage videos</a>`;
    } else if (currentUser) {
        renderSubscribeBtn(actionsEl);
    }

    document.title = `${profile.username || 'Channel'} – Codara`; 
}

function renderSubscribeBtn(container) {
    container.innerHTML = isSubscribed
        ? `<button class="btn btn-subscribed btn-sm" id="subBtn">Subscribed</button>`
        : `<button class="btn btn-primary btn-sm" id="subBtn">Subscribe</button>`;
    document.getElementById('subBtn')?.addEventListener('click', handleSubscribe);
}

// ── Subscribe ─────────────────────────────────────────────────
async function loadSubscriptionStatus(channelUserId) {
    if (!currentUser) return;
    const { data } = await supabase.from('subscriptions').select('id')
        .eq('subscriber_id', currentUser.id).eq('channel_id', channelUserId).maybeSingle();
    isSubscribed = !!data;

    const { count } = await supabase.from('subscriptions').select('*', { count: 'exact', head: true })
        .eq('channel_id', channelUserId);
    subscriberCount = count || 0;
}

async function handleSubscribe() {
    if (!currentUser) { window.location.href = 'login.html'; return; }
    const channelUserId = profileUserId || currentUser.id;
    const btn = document.getElementById('subBtn');
    if (btn) { btn.disabled = true; }

    if (isSubscribed) {
        await supabase.from('subscriptions').delete()
            .eq('subscriber_id', currentUser.id).eq('channel_id', channelUserId);
        isSubscribed = false;
        subscriberCount = Math.max(0, subscriberCount - 1);
        showToast('Unsubscribed');
    } else {
        await supabase.from('subscriptions').insert({ subscriber_id: currentUser.id, channel_id: channelUserId });
        isSubscribed = true;
        subscriberCount += 1;
        showToast('Subscribed!');
    }

    // Update stat + button
    document.getElementById('channelStats').innerHTML = `<span class="channel-stat"><strong>${formatSubs(subscriberCount)}</strong></span>`;
    renderSubscribeBtn(document.getElementById('channelActions'));
}

// ── Edit channel name ─────────────────────────────────────────
function startEditName() {
    if (editingName) return;
    editingName = true;
    const nameWrap = document.getElementById('channelNameWrap');
    const currentName = document.getElementById('channelNameText').textContent;
    nameWrap.innerHTML = `
        <input class="channel-name-edit" id="nameInput" value="${currentName}" maxlength="50">
        <div class="edit-name-actions">
            <button class="cancel-name-btn" id="cancelNameBtn">Cancel</button>
            <button class="save-name-btn" id="saveNameBtn">Save</button>
        </div>`;
    document.getElementById('nameInput').focus();
    document.getElementById('cancelNameBtn').addEventListener('click', cancelEditName);
    document.getElementById('saveNameBtn').addEventListener('click', saveChannelName);
    document.getElementById('nameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') saveChannelName();
        if (e.key === 'Escape') cancelEditName();
    });
}

function cancelEditName() {
    editingName = false;
    renderChannelHeader(channelProfile);
}

async function saveChannelName() {
    const newName = document.getElementById('nameInput')?.value.trim();
    if (!newName) { showToast('Name cannot be empty'); return; }

    const { error } = await supabase.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    if (error) { showToast('Failed to update name'); return; }

    // Also update videos table uploader_username
    await supabase.from('videos').update({ uploader_username: newName }).eq('user_id', currentUser.id);

    channelProfile.username = newName;
    editingName = false;
    renderChannelHeader(channelProfile);
    showToast('Channel name updated!');
}

// ── Avatar upload ─────────────────────────────────────────────
document.getElementById('avatarFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB'); return; }

    showToast('Uploading...');

    const ext = file.name.split('.').pop();
    const path = `avatars/${currentUser.id}.${ext}`;

    const { error: uploadError } = await supabase.storage.from('avatars').upload(path, file, { upsert: true });
    if (uploadError) { showToast('Upload failed'); return; }

    const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path);

    // Update profile
    await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
    // Update videos
    await supabase.from('videos').update({ uploader_avatar: publicUrl }).eq('user_id', currentUser.id);

    channelProfile.avatar_url = publicUrl;
    document.getElementById('channelAvatar').innerHTML = `<img src="${publicUrl}" alt="avatar">`;
    showToast('Avatar updated!');

    // Reset input
    e.target.value = '';
});

// ── Load videos ───────────────────────────────────────────────
async function loadVideos(userId) {
    const { data, error } = await supabase.from('videos').select('id, title, thumbnail_url, views, created_at')
        .eq('user_id', userId).order('created_at', { ascending: false });

    const body = document.getElementById('channelBody');

    if (error || !data || data.length === 0) {
        if (isOwnChannel) {
            body.innerHTML = `
                <div class="upload-cta">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <div class="upload-cta-title">No videos yet</div>
                    <div class="upload-cta-sub">Upload your first video to start building your channel.</div>
                </div>`;
        } else {
            body.innerHTML = `
                <div class="state-container">
                    <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <div class="state-title">No videos yet</div>
                    <div class="state-sub">This channel hasn't uploaded any videos.</div>
                </div>`;
        }
        return;
    }

    body.innerHTML = `<div class="video-grid">${data.map(v => {
        const thumb = v.thumbnail_url
            ? `<img src="${v.thumbnail_url}" alt="${v.title || ''}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">`
            : `<div class="card-thumb-placeholder"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>`;
        return `
            <a class="video-card" href="watch.html?video_id=${v.id}">
                <div class="card-thumb">${thumb}</div>
                <div class="card-info">
                    <div class="card-title">${v.title || 'Untitled'}</div>
                    <div class="card-meta">${formatViews(v.views)} views · ${formatTimeAgo(v.created_at)}</div>
                </div>
            </a>`;
    }).join('')}</div>`;
}

// ── Load profile ──────────────────────────────────────────────
async function loadProfile(userId) {
    const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle();
    if (error || !data) {
        // Fallback: build from auth user if own channel
        if (isOwnChannel && currentUser) {
            return {
                id: currentUser.id,
                username: getDisplayName(currentUser),
                avatar_url: currentUser.user_metadata?.avatar_url || null
            };
        }
        return null;
    }
    return data;
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user || null;

    if (currentUser) showLoggedInNav(currentUser);
    else showLoggedOutNav();

    // Determine whose channel to show
    const targetUserId = profileUserId || currentUser?.id;

    if (!targetUserId) {
        // Not logged in, no userId in URL
        document.getElementById('channelBody').innerHTML = `
            <div class="state-container">
                <div class="state-title">No channel found</div>
                <div class="state-sub">Sign in to view your channel.</div>
                <a href="login.html" class="btn btn-primary" style="margin-top:8px;">Log in</a>
            </div>`;
        document.getElementById('channelNameText').textContent = 'Channel';
        return;
    }

    isOwnChannel = currentUser && (targetUserId === currentUser.id);

    // Load profile + subscriptions in parallel
    const [profile] = await Promise.all([
        loadProfile(targetUserId),
        loadSubscriptionStatus(targetUserId)
    ]);

    channelProfile = profile || { id: targetUserId, username: 'Unknown', avatar_url: null };
    renderChannelHeader(channelProfile);
    await loadVideos(targetUserId);

    // Auth state changes
    supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            showLoggedInNav(session.user);
        }
        if (event === 'SIGNED_OUT') {
            currentUser = null;
            showLoggedOutNav();
        }
    });
}

init();
</script>
