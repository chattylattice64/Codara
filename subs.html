<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; overflow-x: hidden; }

.sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 240px; background: #131313; border-right: 1px solid #1f1f1f; padding: 20px 12px 20px; overflow-y: auto; z-index: 150; transition: transform 0.3s ease; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
.sidebar .logo { display: flex; align-items: center; gap: 10px; font-size: 34px; font-weight: 800; padding: 10px 12px; color: #ffffff; text-decoration: none; border-radius: 8px; margin-bottom: 12px; }
.sidebar .logo .logo-icon { width: 56px; height: 56px; border-radius: 8px; background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.sidebar .logo:hover { background: rgba(0, 31, 63, 0.09); }
.logo-icon { background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
.logo-icon::before { content: ''; }
.sidebar-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; color: #b0b0b0; text-decoration: none; border-radius: 8px; transition: all 0.2s; cursor: pointer; margin-bottom: 4px; }
.sidebar-item:hover { background: #1f1f1f; color: #ffffff; }
.sidebar-item.active { background: #001f3f; color: #ffffff; }
.sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-item-text { font-size: 14px; font-weight: 500; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section-title { padding: 8px 16px; font-size: 12px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-divider { height: 1px; background: #1f1f1f; margin: 12px 0; }

.navbar { background: #131313; padding: 9px 40px 9px 280px; display: flex; align-items: center; justify-content: flex-end; gap: 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1f1f1f; min-height: 70px; }
.search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; max-width: 700px; padding: 0 20px; }
.search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #6b6b6b; pointer-events: none; }
.search-input { width: 100%; padding: 10px 16px 10px 44px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; color: #ffffff; font-size: 14px; transition: all 0.2s; }
.search-input:focus { outline: none; border-color: #001f3f; background: #252525; }
.search-input::placeholder { color: #6b6b6b; }
.navbar::before { content: ''; flex: 1; }
.nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; position: relative; z-index: 10; }

.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.btn-secondary { background: transparent; color: #ffffff; border: 1px solid #3a3a3a; }
.btn-secondary:hover { background: #1f1f1f; }
.btn-primary { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); color: white; }
.btn-primary:hover { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); transform: translateY(-1px); }
.btn-sm { padding: 7px 16px; font-size: 13px; }
.btn-unsub { background: #1f1f1f; color: #b0b0b0; border: 1px solid #2a2a2a; }
.btn-unsub:hover { background: rgba(248,113,113,0.1); color: #f87171; border-color: #3a1a1a; }

.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; transition: transform 0.2s; overflow: hidden; }
.user-avatar:hover { transform: scale(1.05); }
.user-menu { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s; z-index: 1000; }
.dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown-item { padding: 12px 16px; color: #b0b0b0; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-size: 14px; }
.dropdown-item:hover { background: #2a2a2a; color: #ffffff; }
.dropdown-divider { height: 1px; background: #2a2a2a; margin: 4px 0; }

.main-content { margin-left: 240px; padding: 28px 40px; min-height: 100vh; }
.sidebar-toggle { background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; cursor: pointer; display: none; transition: all 0.2s; flex-shrink: 0; }
.sidebar-toggle:hover { background: #2a2a2a; }
.sidebar-toggle svg { width: 20px; height: 20px; color: #ffffff; }

/* Page header */
.page-header { margin-bottom: 28px; }
.page-title { font-size: 26px; font-weight: 700; }
.page-title-sub { font-size: 14px; color: #6b6b6b; margin-top: 4px; }

/* Channels row */
.channels-strip { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 32px; scrollbar-width: none; }
.channels-strip::-webkit-scrollbar { display: none; }
.channel-chip { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; text-decoration: none; }
.channel-chip-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s; }
.channel-chip:hover .channel-chip-avatar { border-color: #001f3f; }
.channel-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }
.channel-chip-name { font-size: 12px; color: #8a8a8a; text-align: center; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Section title */
.section-label { font-size: 13px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

/* Videos feed */
.feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

.video-card { background: #111111; border-radius: 10px; overflow: hidden; transition: transform 0.2s, background 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.video-card:hover { transform: translateY(-3px); background: #161616; }
.card-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a1a; overflow: hidden; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #2a2a2a; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); }
.card-body { padding: 10px 12px 14px; display: flex; gap: 10px; }
.card-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; cursor: pointer; }
.card-avatar img { width: 100%; height: 100%; object-fit: cover; }
.card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 13px; font-weight: 500; color: #f0f0f0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 3px; }
.card-channel { font-size: 12px; color: #6b6b6b; }
.card-meta { font-size: 12px; color: #5a5a5a; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { background: #111111; border-radius: 10px; overflow: hidden; }
.skeleton-thumb { width: 100%; aspect-ratio: 16/9; }
.skeleton-body { padding: 10px 12px 14px; display: flex; gap: 10px; }
.skeleton-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
.skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }

/* Channel pill skeletons */
.channel-chip-skeleton { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }

/* States */
.state-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; gap: 16px; }
.state-icon { width: 52px; height: 52px; color: #2a2a2a; }
.state-title { font-size: 18px; font-weight: 600; color: #7a7a7a; }
.state-sub { font-size: 14px; color: #4a4a4a; max-width: 300px; line-height: 1.5; }

/* Responsive */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .main-content { margin-left: 0; padding: 16px 20px; }
    .navbar { padding: 16px 20px; justify-content: flex-start; gap: 12px; }
    .search-container { position: relative; left: auto; transform: none; flex: 1; max-width: none; padding: 0; margin-left: 0; }
    .search-icon { left: 16px; }
    .navbar::before { display: none; }
}
@media (max-width: 640px) {
    .navbar { padding: 12px 16px; }
    .main-content { padding: 12px 16px; }
    .feed-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
}
</style>

<script type="module">
const { supabase } = await import('./JS/supabase.js');

let currentUser = null;
let activeFilter = null; // channel_id to filter by, null = all

// ── Helpers ───────────────────────────────────────────────────
function getUserInitials(text) { return text?.trim().charAt(0).toUpperCase() || '?'; }
function getDisplayName(user) {
    if (user.user_metadata?.full_name) return user.user_metadata.full_name;
    if (user.user_metadata?.name) return user.user_metadata.name;
    if (user.email) { const n = user.email.split('@')[0]; return n.charAt(0).toUpperCase() + n.slice(1); }
    return 'User';
}
function formatViews(n) {
    if (!n) return '0 views';
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M views';
    if (n >= 1_000) return (n/1_000).toFixed(1).replace(/\.0$/,'') + 'K views';
    return n + ' views';
}
function formatTimeAgo(str) {
    if (!str) return '';
    const s = Math.floor((Date.now() - new Date(str)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + ' min ago';
    if (s < 86400) return Math.floor(s/3600) + ' hr ago';
    if (s < 2592000) return Math.floor(s/86400) + ' days ago';
    if (s < 31536000) return Math.floor(s/2592000) + ' mo ago';
    return Math.floor(s/31536000) + ' yr ago';
}

// ── Nav ───────────────────────────────────────────────────────
function showLoggedInNav(user) {
    const navRight = document.getElementById('navRight');
    const displayName = getDisplayName(user);
    const avatarUrl = user.user_metadata?.avatar_url;
    const avatarHTML = avatarUrl
        ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : getUserInitials(displayName);
    navRight.innerHTML = `
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">${avatarHTML}</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="channel.html" class="dropdown-item">Your Channel</a>
                <a href="settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="logoutBtn">Log out</button>
            </div>
        </div>`;
    document.getElementById('userAvatar')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('dropdownMenu').classList.toggle('show'); });
    document.addEventListener('click', () => document.getElementById('dropdownMenu')?.classList.remove('show'));
    document.getElementById('dropdownMenu')?.addEventListener('click', e => e.stopPropagation());
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.reload(); });
}
function showLoggedOutNav() {
    document.getElementById('navRight').innerHTML = `<a href="login.html" class="btn btn-secondary">Log in</a><a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>`;
}

// ── Sidebar ───────────────────────────────────────────────────
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebar = document.getElementById('sidebar');
if (sidebarToggle) {
    sidebarToggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', e => { if (window.innerWidth <= 1024 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) sidebar.classList.remove('open'); });
    sidebar.addEventListener('click', e => e.stopPropagation());
}

// ── Render channels strip ─────────────────────────────────────
function renderChannels(channels) {
    const strip = document.getElementById('channelsStrip');
    if (!strip) return;

    strip.innerHTML = channels.map(ch => {
        const avatarContent = ch.avatar_url
            ? `<img src="${ch.avatar_url}" alt="${ch.username}">`
            : getUserInitials(ch.username);
        return `
            <div class="channel-chip" data-channel-id="${ch.id}" onclick="filterByChannel('${ch.id}')">
                <div class="channel-chip-avatar" id="chip-${ch.id}">${avatarContent}</div>
                <span class="channel-chip-name">${ch.username || 'Unknown'}</span>
            </div>`;
    }).join('');

    // Add "All" pill at start
    strip.insertAdjacentHTML('afterbegin', `
        <div class="channel-chip" onclick="filterByChannel(null)">
            <div class="channel-chip-avatar" id="chip-all" style="background:linear-gradient(135deg,#6b6b6b,#3a3a3a);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </div>
            <span class="channel-chip-name">All</span>
        </div>`);

    setActiveChip(null);
}

function setActiveChip(channelId) {
    document.querySelectorAll('.channel-chip-avatar').forEach(el => {
        el.style.borderColor = 'transparent';
    });
    const target = channelId ? document.getElementById(`chip-${channelId}`) : document.getElementById('chip-all');
    if (target) target.style.borderColor = '#001f3f';
}

// ── Filter ────────────────────────────────────────────────────
let allVideos = [];
window.filterByChannel = function(channelId) {
    activeFilter = channelId;
    setActiveChip(channelId);
    const filtered = channelId ? allVideos.filter(v => v.user_id === channelId) : allVideos;
    renderFeed(filtered);
};

// ── Render feed ───────────────────────────────────────────────
function renderFeed(videos) {
    const grid = document.getElementById('feedGrid');
    if (!grid) return;

    if (!videos || videos.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#4a4a4a;">
                <p style="font-size:14px;">No videos from this channel yet.</p>
            </div>`;
        return;
    }

    grid.innerHTML = videos.map(v => {
        const thumb = v.thumbnail_url
            ? `<img src="${v.thumbnail_url}" alt="${v.title || ''}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">`
            : `<div class="card-thumb-placeholder"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>`;
        const avatarContent = v.uploader_avatar
            ? `<img src="${v.uploader_avatar}" alt="${v.uploader_username || ''}">`
            : getUserInitials(v.uploader_username);

        return `
            <a class="video-card" href="watch.html?video_id=${v.id}">
                <div class="card-thumb">${thumb}</div>
                <div class="card-body">
                    <div class="card-avatar" onclick="event.preventDefault();window.location.href='channel.html?userId=${v.user_id}'">${avatarContent}</div>
                    <div class="card-info">
                        <div class="card-title">${v.title || 'Untitled'}</div>
                        <div class="card-channel">${v.uploader_username || ''}</div>
                        <div class="card-meta">${formatViews(v.views)} · ${formatTimeAgo(v.created_at)}</div>
                    </div>
                </div>
            </a>`;
    }).join('');
}

// ── Load page ─────────────────────────────────────────────────
async function loadSubscriptions(userId) {
    // 1. Get subscriptions
    const { data: subs, error: subsError } = await supabase
        .from('subscriptions')
        .select('channel_id')
        .eq('subscriber_id', userId);

    if (subsError || !subs || subs.length === 0) {
        document.getElementById('subCount').textContent = '';
        document.getElementById('channelsStrip').innerHTML = '';
        document.getElementById('feedGrid').innerHTML = '';
        document.getElementById('pageContent').innerHTML = `
            <div class="state-container">
                <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <div class="state-title">No subscriptions yet</div>
                <div class="state-sub">Subscribe to channels to see their latest videos here.</div>
                <a href="index.html" class="btn btn-primary" style="margin-top:8px;">Browse videos</a>
            </div>`;
        return;
    }

    const channelIds = subs.map(s => s.channel_id);
    document.getElementById('subCount').textContent = `${channelIds.length} channel${channelIds.length !== 1 ? 's' : ''}`;

    // 2. Get channel profiles
    const { data: profiles } = await supabase
        .from('profiles')
        .select('id, username, avatar_url')
        .in('id', channelIds);

    // Build profile map
    const profileMap = {};
    (profiles || []).forEach(p => { profileMap[p.id] = p; });

    // Channels for strip (preserve sub order)
    const channels = channelIds.map(id => ({
        id,
        username: profileMap[id]?.username || 'Unknown',
        avatar_url: profileMap[id]?.avatar_url || null
    }));

    renderChannels(channels);

    // 3. Get latest videos from subscribed channels
    const { data: videos } = await supabase
        .from('videos')
        .select('id, title, thumbnail_url, views, created_at, user_id, uploader_username, uploader_avatar')
        .in('user_id', channelIds)
        .order('created_at', { ascending: false })
        .limit(60);

    allVideos = videos || [];
    renderFeed(allVideos);
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user || null;

    if (currentUser) {
        showLoggedInNav(currentUser);
        await loadSubscriptions(currentUser.id);
    } else {
        showLoggedOutNav();
        document.getElementById('pageContent').innerHTML = `
            <div class="state-container">
                <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <div class="state-title">Sign in to see subscriptions</div>
                <div class="state-sub">Subscribe to your favourite channels and their videos will appear here.</div>
                <div style="display:flex;gap:12px;margin-top:8px;">
                    <a href="login.html" class="btn btn-secondary">Log in</a>
                    <a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>
                </div>
            </div>`;
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            showLoggedInNav(session.user);
            await loadSubscriptions(session.user.id);
        }
        if (event === 'SIGNED_OUT') {
            currentUser = null;
            showLoggedOutNav();
        }
    });
}

init();
</script>
