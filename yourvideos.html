<script type="module">
const { supabase } = await import('./JS/supabase.js');

function getUserInitials(text) { return text?.trim().charAt(0).toUpperCase() || 'U'; }
function getDisplayName(user) {
    if (user.user_metadata?.full_name) return user.user_metadata.full_name;
    if (user.user_metadata?.name) return user.user_metadata.name;
    if (user.email) { const n = user.email.split('@')[0]; return n.charAt(0).toUpperCase() + n.slice(1); }
    return 'User';
}

function showLoggedInState(user) {
    const navRight = document.getElementById('navRight');
    if (!navRight) return;
    const displayName = getDisplayName(user);
    const avatarUrl = user.user_metadata?.avatar_url;
    const avatarHTML = avatarUrl
        ? `<img src="${avatarUrl}" alt="${displayName}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : getUserInitials(displayName);
    navRight.innerHTML = `
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">${avatarHTML}</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="channel.html" class="dropdown-item">Your Channel</a>
                <a href="settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="logoutBtn">Log out</button>
            </div>
        </div>`;
    document.getElementById('userAvatar')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('dropdownMenu').classList.toggle('show'); });
    document.addEventListener('click', () => document.getElementById('dropdownMenu')?.classList.remove('show'));
    document.getElementById('dropdownMenu')?.addEventListener('click', e => e.stopPropagation());
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.reload(); });
}

function showLoggedOutState() {
    document.getElementById('navRight').innerHTML = `<a href="login.html" class="btn btn-secondary">Log in</a><a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>`;
}

// Sidebar toggle
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebar = document.getElementById('sidebar');
if (sidebarToggle) {
    sidebarToggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', e => { if (window.innerWidth <= 1024 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) sidebar.classList.remove('open'); });
    sidebar.addEventListener('click', e => e.stopPropagation());
}

// Helpers
function formatViews(n) {
    if (!n) return '0';
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M';
    if (n >= 1_000) return (n/1_000).toFixed(1).replace(/\.0$/,'') + 'K';
    return String(n);
}
function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#1a0a0a' : '#1f1f1f';
    t.style.borderColor = isError ? '#3a1a1a' : '#2a2a2a';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// State
let allVideos = [];
let currentUserId = null;
let pendingDeleteId = null;
let pendingEditId = null;

// Render
function renderVideos(videos) {
    const tbody = document.getElementById('videosTbody');
    const countEl = document.getElementById('videoCount');

    if (!videos || videos.length === 0) {
        countEl.textContent = '';
        document.getElementById('videosContent').innerHTML = `
            <div class="state-container">
                <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <div class="state-title">No videos uploaded yet</div>
                <div class="state-sub">Videos you upload will appear here. Head to your channel to upload your first video.</div>
                <a href="channel.html" class="btn btn-primary" style="margin-top:8px;">Go to channel</a>
            </div>`;
        return;
    }

    countEl.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;

    document.getElementById('videosContent').innerHTML = `
        <div class="videos-table-wrap">
            <table class="videos-table">
                <thead>
                    <tr>
                        <th>Video</th>
                        <th>Date</th>
                        <th>Views</th>
                        <th>Likes</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="videosTbody"></tbody>
            </table>
        </div>`;

    const newTbody = document.getElementById('videosTbody');
    newTbody.innerHTML = videos.map(v => {
        const thumb = v.thumbnail_url
            ? `<img class="video-thumb" src="${v.thumbnail_url}" alt="${v.title || ''}" loading="lazy">`
            : `<div class="video-thumb-placeholder"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>`;
        return `
            <tr>
                <td>
                    <a href="watch.html?video_id=${v.id}" class="video-thumb-cell" style="text-decoration:none;">
                        ${thumb}
                        <span class="video-title-text">${v.title || 'Untitled'}</span>
                    </a>
                </td>
                <td><span class="video-date">${formatDate(v.created_at)}</span></td>
                <td><span class="video-views">${formatViews(v.views)}</span></td>
                <td><span class="video-likes">${v.likes || 0}</span></td>
                <td>
                    <div class="manage-menu-wrap">
                        <button class="manage-btn" data-video-id="${v.id}" onclick="toggleManageMenu('${v.id}', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                            Manage
                        </button>
                    </div>
                </td>
            </tr>`;
    }).join('');
}

function renderNotLoggedIn() {
    document.getElementById('videoCount').textContent = '';
    document.getElementById('videosContent').innerHTML = `
        <div class="state-container">
            <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <div class="state-title">Sign in to see your videos</div>
            <div class="state-sub">Upload and manage your videos by signing in.</div>
            <div style="display:flex;gap:12px;margin-top:8px;">
                <a href="login.html" class="btn btn-secondary">Log in</a>
                <a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>
            </div>
        </div>`;
}

// Manage menu
window.toggleManageMenu = function(videoId, btn) {
    // Close any existing
    document.querySelectorAll('.manage-dropdown').forEach(d => d.remove());

    const rect = btn.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'manage-dropdown';
    menu.style.top = `${rect.bottom + 6}px`;
    menu.style.right = `${window.innerWidth - rect.right}px`;

    const video = allVideos.find(v => v.id === videoId);

    menu.innerHTML = `
        <button class="manage-dropdown-item" onclick="openEditModal('${videoId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Edit title
        </button>
        <button class="manage-dropdown-item" onclick="shareVideo('${videoId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Copy link
        </button>
        <div class="manage-dropdown-divider"></div>
        <button class="manage-dropdown-item danger" onclick="openDeleteModal('${videoId}', '${(video?.title || 'this video').replace(/'/g, "\\'")}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
            Delete
        </button>
    `;

    document.body.appendChild(menu);

    // Close on outside click
    setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
            if (!menu.contains(e.target) && e.target !== btn) {
                menu.remove();
                document.removeEventListener('click', closeMenu);
            }
        });
    }, 0);
};

// Share
window.shareVideo = function(videoId) {
    document.querySelectorAll('.manage-dropdown').forEach(d => d.remove());
    const url = `${window.location.origin}/watch.html?video_id=${videoId}`;
    navigator.clipboard.writeText(url).then(() => {
        showToast('Video link copied to clipboard!');
    }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('Video link copied!'); }
        catch { showToast('Failed to copy link', true); }
        document.body.removeChild(ta);
    });
};

// Edit
window.openEditModal = function(videoId) {
    document.querySelectorAll('.manage-dropdown').forEach(d => d.remove());
    pendingEditId = videoId;
    const video = allVideos.find(v => v.id === videoId);
    document.getElementById('editTitleInput').value = video?.title || '';
    document.getElementById('editModal').classList.add('show');
    setTimeout(() => document.getElementById('editTitleInput').focus(), 50);
};

document.getElementById('cancelEditBtn').addEventListener('click', () => {
    document.getElementById('editModal').classList.remove('show');
    pendingEditId = null;
});

document.getElementById('saveEditBtn').addEventListener('click', async () => {
    const newTitle = document.getElementById('editTitleInput').value.trim();
    if (!newTitle) { showToast('Title cannot be empty', true); return; }

    const btn = document.getElementById('saveEditBtn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    const { error } = await supabase.from('videos').update({ title: newTitle }).eq('id', pendingEditId);

    btn.textContent = 'Save changes';
    btn.disabled = false;

    if (error) { showToast('Failed to update title', true); return; }

    const video = allVideos.find(v => v.id === pendingEditId);
    if (video) video.title = newTitle;
    document.getElementById('editModal').classList.remove('show');
    renderVideos(allVideos);
    showToast('Title updated!');
    pendingEditId = null;
});

// Delete
window.openDeleteModal = function(videoId, title) {
    document.querySelectorAll('.manage-dropdown').forEach(d => d.remove());
    pendingDeleteId = videoId;
    document.getElementById('deleteVideoName').textContent = title;
    document.getElementById('deleteModal').classList.add('show');
};

document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
    document.getElementById('deleteModal').classList.remove('show');
    pendingDeleteId = null;
});

document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.textContent = 'Deleting...';
    btn.disabled = true;

    const { error } = await supabase.from('videos').delete().eq('id', pendingDeleteId);

    btn.textContent = 'Delete video';
    btn.disabled = false;

    if (error) { showToast('Failed to delete video', true); return; }

    allVideos = allVideos.filter(v => v.id !== pendingDeleteId);
    document.getElementById('deleteModal').classList.remove('show');
    renderVideos(allVideos);
    showToast('Video deleted.');
    pendingDeleteId = null;
});

// Close modals on outside click
document.getElementById('editModal').addEventListener('click', e => { if (e.target.id === 'editModal') { document.getElementById('editModal').classList.remove('show'); pendingEditId = null; } });
document.getElementById('deleteModal').addEventListener('click', e => { if (e.target.id === 'deleteModal') { document.getElementById('deleteModal').classList.remove('show'); pendingDeleteId = null; } });

// Escape key
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.getElementById('editModal').classList.remove('show');
        document.getElementById('deleteModal').classList.remove('show');
        document.querySelectorAll('.manage-dropdown').forEach(d => d.remove());
    }
});

// Load videos
async function loadVideos(userId) {
    const { data, error } = await supabase
        .from('videos')
        .select('id, title, thumbnail_url, views, likes, created_at')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

    if (error) { console.error('Error loading videos:', error); renderVideos([]); return; }
    allVideos = data || [];
    renderVideos(allVideos);
}

// Init
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        showLoggedInState(session.user);
        currentUserId = session.user.id;
        await loadVideos(session.user.id);
    } else {
        showLoggedOutState();
        renderNotLoggedIn();
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            showLoggedInState(session.user);
            currentUserId = session.user.id;
            await loadVideos(session.user.id);
        }
        if (event === 'SIGNED_OUT') {
            currentUserId = null; allVideos = [];
            showLoggedOutState();
            renderNotLoggedIn();
        }
    });
}

init();
</script>
