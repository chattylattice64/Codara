<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Codara</title>
    <link rel="icon" href="assets/hamico.png" type="image/x-icon" />
    <script src="https://pl28581525.effectivegatecpm.com/74/0e/8a/740e8a8d15d4dc2ab86673d6fc3d5cc1.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .background-gif {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .card-wrapper {
            position: relative;
            min-height: 600px;
        }

        .login-card, .signup-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 55px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 2s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center center;
            will-change: opacity, transform, filter;
        }

        .login-card.active, .signup-card.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: auto;
        }

        .login-card.hidden {
            opacity: 0;
            transform: scale(0.85);
            filter: blur(20px);
            pointer-events: none;
        }

        .signup-card {
            opacity: 0;
            transform: scale(0.85);
            filter: blur(20px);
            pointer-events: none;
        }

        .signup-card.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: auto;
        }

        .signup-card.hidden {
            opacity: 0;
            transform: scale(0.85);
            filter: blur(20px);
            pointer-events: none;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: #001f3f url('assets/hamico.png') center/contain no-repeat;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffffff;
            color: white;
            font-weight: bold;
            font-size: 28px;
            box-shadow: 0 4px 16px rgba(0, 31, 63, 0.4);
        }

        .logo-text {
            font-size: 40px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #f0f0f0;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: #001f3f;
            box-shadow: 0 0 0 3px rgba(0, 31, 63, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .password-toggle {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .toggle-btn:hover {
            color: #ffffff;
            background: rgba(0, 31, 63, 0.3);
        }

        .error-message {
            color: #fca5a5;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 32px;
        }

        .forgot-password a {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: #ffffff;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #001f3f 0%, #000000 100%);
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0, 31, 63, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #001f3f 0%, #000000 100%);
            box-shadow: 0 6px 20px rgba(0, 31, 63, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(0, 31, 63, 0.5);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider span {
            background: rgba(0, 31, 63, 0.15);
            backdrop-filter: blur(30px);
            padding: 0 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            position: relative;
        }

        .signup-link, .signin-link {
            text-align: center;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .signup-link a, .signin-link a {
            color: #c4b5fd;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
        }

        .signup-link a:hover, .signin-link a:hover {
            color: #ffffff;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Intro Animation Styles */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            animation: fadeOut 0.5s ease-in-out 2.5s forwards;
        }

        .intro-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: logoAppear 1s ease-out;
        }

        .intro-logo-icon {
            width: 100px;
            height: 100px;
            background: #001f3f url('assets/hamico.png') center/contain no-repeat;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #ffffff;
            color: white;
            font-weight: bold;
            font-size: 48px;
            box-shadow: 0 8px 32px rgba(0, 31, 63, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .intro-logo-text {
            font-size: 34px;
            font-weight: 800;
            color: #ffffff;
            animation: slideUp 1s ease-out 0.3s both;
        }

        @keyframes logoAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(0, 31, 63, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 48px rgba(0, 31, 63, 0.6);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .main-content {
            opacity: 0;
            animation: fadeIn 0.5s ease-in-out 2.5s forwards;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .login-card, .signup-card {
                padding: 36px 28px;
            }

            h1 {
                font-size: 24px;
            }

            .logo-text {
                font-size: 32px;
            }

            .logo-icon {
                width: 56px;
                height: 56px;
                background: #001f3f url('assets/hamico.png') center/contain no-repeat;
                border: 2px solid #ffffff;
                font-size: 24px;
            }

            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Intro Screen -->
    <div class="intro-screen">
        <div class="intro-logo">
            <div class="intro-logo-icon"></div>
            <div class="intro-logo-text">Codara</div>
        </div>
    </div>

    <!-- Background -->
    <div class="background-container">
        <img id="backgroundGif" class="background-gif" src="assets/back.gif" alt="">
        <div class="overlay"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <div class="card-wrapper">

                <!-- LOGIN CARD -->
                <div class="login-card active" id="loginCard">
                    <div class="logo">
                        <div class="logo-icon"></div>
                        <div class="logo-text">Codara</div>
                    </div>

                    <h1>Welcome back</h1>

                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="Enter your email">
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" required placeholder="Enter your password">
                        </div>

                        <button type="submit" class="btn btn-primary" id="loginBtn">
                            Sign in
                        </button>

                        <div class="divider"><span>or</span></div>

                        <button type="button" class="btn btn-secondary" id="googleBtn">
                            <svg class="google-icon" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                        </button>

                    </form>

                    <div class="signup-link">
                        Don't have an account? <a id="showSignup">Sign up</a>
                    </div>
                </div>

                <!-- SIGNUP CARD -->
                <div class="signup-card hidden" id="signupCard">
                    <div class="logo">
                        <div class="logo-icon"></div>
                        <div class="logo-text">Codara</div>
                    </div>

                    <h1>Create account</h1>

                    <form id="signupForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="signupName" required placeholder="Your name">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="signupEmail" required placeholder="Your email">
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signupPassword" required placeholder="Create password">
                        </div>

                        <button type="submit" class="btn btn-primary" id="signupBtn">
                            Create account
                        </button>

                        <div class="divider"><span>or</span></div>

                        <button type="button" class="btn btn-secondary" id="googleSignupBtn">
                            <svg class="google-icon" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                        </button>
                    </form>

                    <div class="signin-link">
                        Already have an account? <a id="showLogin">Sign in</a>
                    </div>
                </div>

            </div>
        </div>
    </div>


<script type="module">
import { supabase } from "/JS/supabase.js";

/* =====================
   CARD TOGGLE
===================== */
const loginCard = document.getElementById('loginCard');
const signupCard = document.getElementById('signupCard');

document.getElementById('showSignup').onclick = () => {
    loginCard.classList.remove('active');
    loginCard.classList.add('hidden');
    signupCard.classList.remove('hidden');
    signupCard.classList.add('active');
};

document.getElementById('showLogin').onclick = () => {
    signupCard.classList.remove('active');
    signupCard.classList.add('hidden');
    loginCard.classList.remove('hidden');
    loginCard.classList.add('active');
};

// If the URL includes ?mode=signup, automatically show the signup card
try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'signup' || params.get('signup') === '1') {
        document.getElementById('showSignup').onclick();
    }
} catch (e) {
    // ignore
}

/* =====================
   HELPER: Create profile row
   Called after any signup so the profiles table always has a record.
===================== */
async function createProfile(userId, username, avatarUrl = '') {
    const { error } = await supabase
        .from('profiles')
        .upsert(
            {
                id: userId,
                username: username,
                avatar_url: avatarUrl,
                created_at: new Date().toISOString()
            },
            { onConflict: 'id' }   // safe to re-run; won't duplicate
        );

    if (error) {
        console.error('Profile upsert error:', error);
    }
}

/* =====================
   LOGIN
===================== */
const loginBtn = document.getElementById('loginBtn');
const loginForm = document.getElementById('loginForm');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loading"></span> Signing in...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        console.log('Login successful:', data);
        window.location.href = "/index.html";
    } catch (error) {
        console.error('Login error:', error);
        alert('Login failed: ' + error.message);
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign in';
    }
});

/* =====================
   SIGNUP  ← FIXED: now inserts into profiles table
===================== */
const signupBtn = document.getElementById('signupBtn');
const signupForm = document.getElementById('signupForm');

signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="loading"></span> Creating account...';

    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (password.length < 6) {
        alert('Password must be at least 6 characters long');
        signupBtn.disabled = false;
        signupBtn.innerHTML = 'Create account';
        return;
    }

    try {
        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
                data: { full_name: name },
                emailRedirectTo: window.location.origin + "/index.html"
            }
        });

        if (error) throw error;

        console.log('Signup response:', data);

        // ✅ FIX 1: Always write to profiles table right after signup.
        // upsert is used so this is safe even if the row already exists
        // (e.g. trigger already created it).
        if (data.user) {
            await createProfile(data.user.id, name);
        }

        if (data.user && !data.session) {
            // Email confirmation required
            alert('Account created! Please check your email to confirm your account before signing in.');
            document.getElementById('showLogin').onclick();
        } else if (data.session) {
            // Auto-confirm enabled — redirect immediately
            alert('Account created successfully!');
            window.location.href = "/index.html";
        }
    } catch (error) {
        console.error('Signup error:', error);
        alert('Signup failed: ' + error.message);
    } finally {
        signupBtn.disabled = false;
        signupBtn.innerHTML = 'Create account';
    }
});

/* =====================
   GOOGLE OAUTH
   ← Profile is created by the DB trigger (see SQL below).
   If you don't have the trigger, add a listener in index.html instead.
===================== */
async function googleLogin() {
    try {
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + "/index.html"
            }
        });
        if (error) throw error;
    } catch (error) {
        console.error('Google login error:', error);
        alert('Google login failed: ' + error.message);
    }
}

document.getElementById('googleBtn').onclick = googleLogin;
document.getElementById('googleSignupBtn').onclick = googleLogin;

/* =====================
   CHECK EXISTING SESSION
===================== */
supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) {
        console.log('User already logged in, redirecting...');
        window.location.href = "/index.html";
    }
});


</script>

</body>
</html>
