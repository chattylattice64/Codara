<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; overflow-x: hidden; }

.sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 240px; background: #131313; border-right: 1px solid #1f1f1f; padding: 20px 12px 20px; overflow-y: auto; z-index: 150; transition: transform 0.3s ease; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section-title { padding: 8px 16px; font-size: 12px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; color: #b0b0b0; text-decoration: none; border-radius: 8px; transition: all 0.2s; cursor: pointer; margin-bottom: 4px; }
.sidebar-item:hover { background: #1f1f1f; color: #ffffff; }
.sidebar-item.active { background: #001f3f; color: #ffffff; }
.sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-item-text { font-size: 14px; font-weight: 500; }
.sidebar-divider { height: 1px; background: #1f1f1f; margin: 12px 0; }
.sidebar-toggle { background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; cursor: pointer; display: none; transition: all 0.2s; flex-shrink: 0; }
.sidebar-toggle:hover { background: #2a2a2a; }
.sidebar-toggle svg { width: 20px; height: 20px; color: #ffffff; }
.sidebar .logo { display: flex; align-items: center; gap: 10px; font-size: 34px; font-weight: 800; padding: 10px 12px; color: #ffffff; text-decoration: none; border-radius: 8px; margin-bottom: 12px; }
.sidebar .logo .logo-icon { width: 56px; height: 56px; border-radius: 8px; background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.sidebar .logo:hover { background: rgba(0, 31, 63, 0.09); }

.social-bar { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 140; }
.social-bar a { width: 42px; height: 42px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; transition: transform 0.2s, background 0.2s; }
.social-bar a:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
@media (max-width: 1024px) { .social-bar { display: none; } }

.navbar { background: #131313; padding: 16px 40px 16px 280px; display: flex; align-items: center; justify-content: flex-end; gap: 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1f1f1f; }
.logo { display: none; }
.logo-icon { width: 48px; height: 48px; background: url('assets/hamico.png') center/contain no-repeat; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
.logo-icon::before { content: ''; }
.search-container { position: absolute; left: 50%; transform: translateX(-50%) translateX(-120px); width: 100%; max-width: 700px; padding: 0 20px; }
.search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #6b6b6b; pointer-events: none; }
.search-input { width: 100%; padding: 10px 16px 10px 44px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; color: #ffffff; font-size: 14px; transition: all 0.2s; }
.search-input:focus { outline: none; border-color: #001f3f; background: #252525; }
.search-input::placeholder { color: #6b6b6b; }
.navbar::before { content: ''; flex: 1; }
.nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; position: relative; z-index: 10; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
.btn-secondary { background: transparent; color: #ffffff; border: 1px solid #3a3a3a; }
.btn-secondary:hover { background: #1f1f1f; }
.btn-primary { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); color: white; }
.btn-primary:hover { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); transform: translateY(-1px); }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; transition: transform 0.2s; overflow: hidden; }
.user-avatar:hover { transform: scale(1.05); }
.user-menu { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s; z-index: 1000; }
.dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown-item { padding: 12px 16px; color: #b0b0b0; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-size: 14px; font-family: inherit; }
.dropdown-item:hover { background: #2a2a2a; color: #ffffff; }
.dropdown-divider { height: 1px; background: #2a2a2a; margin: 4px 0; }

.main-content { margin-left: 240px; transition: margin-left 0.3s ease; }

.subjects-section { padding: 32px 40px 0; }
.subjects-scroll-wrapper { position: relative; }
.subjects-row { display: flex; gap: 16px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 8px; scrollbar-width: none; -ms-overflow-style: none; }
.subjects-row::-webkit-scrollbar { display: none; }
.scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s; user-select: none; }
.scroll-arrow:hover { background: #2a2a2a; border-color: #001f3f; }
.scroll-arrow.left { left: -20px; }
.scroll-arrow.right { right: -20px; }
.subject-card { flex-shrink: 0; width: 220px; height: 130px; border-radius: 16px; position: relative; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s; }
.subject-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.subject-card.active { border-color: #001f3f; box-shadow: 0 0 0 1px #001f3f, 0 12px 32px rgba(0,31,63,0.3); }
.card-bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.4s ease, filter 0.3s; filter: brightness(0.5); }
.subject-card:hover .card-bg-img { transform: scale(1.08); filter: brightness(0.25); }
.card-gradient { position: absolute; inset: 0; background: linear-gradient(170deg, transparent 20%, rgba(0,0,0,0.8) 100%); }
.card-idle-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px; transition: opacity 0.3s; }
.subject-card:hover .card-idle-content { opacity: 0; pointer-events: none; }
.card-emoji { font-size: 24px; margin-bottom: 4px; }
.card-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
.card-hover-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; text-align: center; opacity: 0; transition: opacity 0.3s; }
.subject-card:hover .card-hover-content { opacity: 1; }
.card-hover-emoji { font-size: 26px; margin-bottom: 6px; }
.card-hover-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 5px; }
.card-hover-desc { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.5; }
.subject-card.all-card { background: #1a1a1a; border: 2px dashed #333; }
.subject-card.all-card.active { border-style: solid; border-color: #001f3f; }
.subject-card.all-card:hover { background: #222; }
.all-card .card-bg-img, .all-card .card-gradient { display: none; }

.trending-section { padding: 32px 40px 60px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.section-title { display: flex; align-items: center; gap: 12px; font-size: 28px; font-weight: 700; }
.trending-icon { color: #001f3f; font-size: 24px; }

#videoGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px 16px; }
.video-card { cursor: pointer; transition: transform 0.2s ease; background: transparent; border-radius: 0; overflow: visible; border: none; }
.video-card:hover { transform: translateY(-2px); }
.thumbnail-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #202020; margin-bottom: 12px; }
.video-thumbnail { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s ease; background: #1f1f1f; display: block; }
.video-card:hover .video-thumbnail { transform: scale(1.05); }
.card-menu-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); border: none; border-radius: 50%; color: white; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.2s ease; z-index: 10; line-height: 1; padding: 0; }
.thumbnail-wrapper:hover .card-menu-btn { opacity: 1; }
.card-menu-btn:hover { background: rgba(0,0,0,0.95); transform: scale(1.1); }
.yt-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(255,0,0,0.9); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 4px; }
.yt-badge svg { width: 10px; height: 10px; }
.video-meta-row { display: flex; gap: 12px; padding: 0 4px; }
.video-avatar-wrap { flex-shrink: 0; }
.video-avatar-initial { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; overflow: hidden; }
.video-text { flex: 1; min-width: 0; margin-top: -2px; }
    .video-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: #f1f1f1; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; max-height: 2.8em; }
.paid-content-title { color: #f5c228; }
.video-submeta { font-size: 12px; color: #aaa; line-height: 1.5; display: flex; flex-wrap: wrap; gap: 4px; }
.uploader-name { color: #aaa; font-weight: 500; }
.uploader-name:hover { color: #fff; }
.video-stats { color: #aaa; }
.card-menu-popup { background: #282828; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.6); overflow: hidden; min-width: 160px; animation: menuFadeIn 0.15s ease; }
@keyframes menuFadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.card-menu { padding: 8px 0; }
.card-menu-item { width: 100%; padding: 10px 16px; background: transparent; border: none; color: #f1f1f1; font-size: 14px; text-align: left; cursor: pointer; transition: background 0.15s ease; display: flex; align-items: center; gap: 12px; font-family: inherit; }
.card-menu-item:hover { background: #3f3f3f; }
.video-card:hover .video-title { color: #fff; }
.video-card:hover .uploader-name { color: #fff; }
.empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: #aaa; }
.empty-state h3 { color: #f1f1f1; font-size: 20px; margin-bottom: 8px; font-weight: 600; }
.empty-state p { color: #aaa; font-size: 14px; }
.empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.loading-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
.loading-spinner { width: 48px; height: 48px; border: 4px solid #1f1f1f; border-top-color: #001f3f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; padding: 20px; }
.modal-backdrop.show { opacity: 1; visibility: visible; }
.upload-modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; transform: scale(0.9) translateY(16px); opacity: 0; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; box-shadow: 0 24px 64px rgba(0,0,0,0.7); }
.upload-modal::-webkit-scrollbar { width: 6px; }
.upload-modal::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
.modal-backdrop.show .upload-modal { transform: scale(1) translateY(0); opacity: 1; }
.modal-header { padding: 24px 28px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 20px; font-weight: 700; color: #ffffff; display: flex; align-items: center; gap: 10px; }
.modal-close { background: transparent; border: none; color: #6b6b6b; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
.modal-close:hover { background: #2a2a2a; color: #ffffff; }
.modal-body { padding: 28px; display: flex; flex-direction: column; gap: 24px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label { font-size: 13px; font-weight: 600; color: #ffffff; }
.form-label .required { color: #ef4444; margin-left: 3px; }
.form-label .optional { color: #6b6b6b; font-weight: 400; margin-left: 4px; font-size: 12px; }
.form-input { width: 100%; padding: 12px 16px; background: #0f0f0f; border: 2px solid #2a2a2a; border-radius: 10px; color: #ffffff; font-size: 14px; transition: all 0.2s; font-family: inherit; }
.form-input:focus { outline: none; border-color: #001f3f; background: #151515; }
.form-input::placeholder { color: #555; }
.form-input.error { border-color: #ef4444; }

/* URL preview box */
.url-preview { display: none; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
.url-preview.show { display: block; }
.url-preview-inner { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
.url-preview-thumb { width: 80px; height: 45px; border-radius: 6px; object-fit: cover; background: #1f1f1f; flex-shrink: 0; }
.url-preview-info { flex: 1; min-width: 0; }
.url-preview-title { font-size: 13px; font-weight: 600; color: #f1f1f1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.url-preview-channel { font-size: 12px; color: #aaa; margin-top: 2px; }
.url-preview-valid { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #10b981; margin-top: 4px; }

.char-counter { text-align: right; font-size: 12px; color: #555; }
.char-counter.warning { color: #f59e0b; }

.subject-picker { display: flex; flex-wrap: wrap; gap: 8px; }
.subject-pill { display: flex; align-items: center; gap: 7px; padding: 8px 14px; background: #0f0f0f; border: 2px solid #2a2a2a; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: #aaa; transition: all 0.2s; }
.subject-pill:hover { border-color: #555; color: #fff; }
.subject-pill.selected { border-color: #001f3f; background: rgba(0,31,63,0.15); color: #fff; }
.sp-emoji { font-size: 15px; }

.status-message { display: none; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; }
.status-message.show { display: block; }
.status-message.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
.status-message.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }

.modal-footer { padding: 20px 28px; border-top: 1px solid #2a2a2a; display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel { padding: 11px 24px; background: transparent; border: 1px solid #3a3a3a; border-radius: 8px; color: #ffffff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn-cancel:hover:not(:disabled) { background: #1f1f1f; }
.btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-submit { padding: 11px 28px; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); border: none; border-radius: 8px; color: #ffffff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; font-family: inherit; }
.btn-submit:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.9; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.btn-submit.loading .btn-spinner { display: block; }

/* ── Responsive ── */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .navbar { padding: 16px 20px; justify-content: flex-start; gap: 12px; }
    .search-container { position: relative; left: auto; transform: none; flex: 1; max-width: none; padding: 0; margin-left: 0; }
    .search-icon { left: 16px; }
    .navbar::before { display: none; }
    .main-content { margin-left: 0; }
    #videoGrid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px 10px; }
}
@media (max-width: 768px) {
    .navbar { padding: 12px 16px; }
    .subjects-section { padding: 24px 16px 0; }
    .trending-section { padding: 24px 16px 40px; }
    #videoGrid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px 8px; }
    .modal-footer { flex-direction: column; }
    .btn-cancel, .btn-submit { width: 100%; justify-content: center; }
}
@media (max-width: 640px) {
    #videoGrid { grid-template-columns: 1fr; gap: 16px; }
}
html { overflow-y: scroll !important; scrollbar-width: auto !important; scrollbar-color: #2a2a2a #0a0a0a !important; }

::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    </style>

    if (u.user_metadata?.full_name) return u.user_metadata.full_name;
    if (u.user_metadata?.name) return u.user_metadata.name;
    if (u.email) { const n = u.email.split('@')[0]; return n.charAt(0).toUpperCase() + n.slice(1); }
    return 'User';
}
function formatTimeAgo(d) {
    if (!d) return 'just now';
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)} min ago`;
    if (s < 86400) return `${Math.floor(s/3600)} hr ago`;
    if (s < 2592000) return `${Math.floor(s/86400)} days ago`;
    if (s < 31536000) return `${Math.floor(s/2592000)} mo ago`;
    return `${Math.floor(s/31536000)} yr ago`;
}
function formatViews(n=0) {
    if (n < 1000) return `${n} views`;
    if (n < 1e6) return `${(n/1e3).toFixed(1)}K views`;
    return `${(n/1e6).toFixed(1)}M views`;
}
function score(v) {
    const views = Number(v.views || 0);
    const hrs = Math.max(0, (Date.now() - new Date(v.created_at)) / 36e5);
    return views + (1 / (hrs + 1)) * 500;
}

// ── YouTube helpers ────────────────────────────────────
function extractYtId(url) {
    if (!url) return null;
    if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
}
function ytThumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function ytEmbed(id) { return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`; }

// Fetch oEmbed title + author from YouTube (no API key needed)
async function fetchYtMeta(id) {
    try {
        const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
        if (!res.ok) return null;
        return await res.json();
    } catch { return null; }
}

// ── URL input handler ──────────────────────────────────
let urlDebounce;
qid('youtubeUrlInput').addEventListener('input', e => {
    clearTimeout(urlDebounce);
    const val = e.target.value.trim();
    const id = extractYtId(val);
    if (!id) {
        extractedYtId = null;
        qid('urlPreview').classList.remove('show');
        qid('submitBtn').disabled = true;
        e.target.classList.remove('error');
        return;
    }
    extractedYtId = id;
    // Show thumbnail immediately
    qid('previewThumb').src = ytThumb(id);
    qid('previewTitle').textContent = 'Fetching title…';
    qid('previewChannel').textContent = '';
    qid('urlPreview').classList.add('show');
    e.target.classList.remove('error');

    urlDebounce = setTimeout(async () => {
        const meta = await fetchYtMeta(id);
        if (meta) {
            qid('previewTitle').textContent = meta.title || '—';
            qid('previewChannel').textContent = meta.author_name || '';
            // Auto-fill title if empty
            const titleEl = qid('titleInput');
            if (!titleEl.value.trim()) {
                titleEl.value = (meta.title || '').slice(0, MAX_TITLE);
                updateCharCounter();
            }
        } else {
            qid('previewTitle').textContent = 'Could not fetch title';
        }
        updateSubmitBtn();
    }, 600);
    updateSubmitBtn();
});

function updateCharCounter() {
    const len = qid('titleInput').value.length;
    const el = qid('charCounter');

}

}

qid('submitBtn').addEventListener('click', async () => {
    if (!selectedSubject) { qid('subjectRequiredNote').style.display = 'block'; return; }
    if (!extractedYtId) { showStatus('Please enter a valid YouTube URL', 'error'); return; }
    const title = qid('titleInput').value.trim();
    if (!title) { showStatus('Title is required', 'error'); return; }
    if (!currentUser) { showStatus('You must be logged in', 'error'); return; }

    const btn = qid('submitBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    qid('submitBtnText').textContent = 'Sharing…';
    qid('cancelBtn').disabled = true;
    hideStatus();

        const { error } = await supabase.from('videos').insert({
            title,

            youtube_url: youtubeUrl,
            youtube_id: ytId,

        popup.querySelector('#cm-open')?.addEventListener('click', ev => {
            ev.stopPropagation(); closeMenu();

// ── Load videos ────────────────────────────────────────
async function loadVideos() {
    qid('videoGrid').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Loading videos...</p></div>';
    try {
        const { supabase } = await import('./JS/supabase.js');
        const { data, error } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        allVideos = (data || []).sort((a, b) => score(b) - score(a));
        const pool = activeSubject === 'all' ? allVideos : allVideos.filter(v => v.subject === activeSubject);
        renderVideos(pool);
    } catch (err) {
        console.error(err);
        qid('videoGrid').innerHTML = `<div class="empty-state"><h3>Error loading videos</h3><p>${err.message}</p></div>`;
    }
}

    SUBJECTS.forEach(s => {
        const card = document.createElement('div');
        card.className = 'subject-card' + (s.id === 'all' ? ' all-card' : '') + (activeSubject === s.id ? ' active' : '');
        if (s.id === 'all') {
            card.innerHTML = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px;"><div style="width:18px;height:18px;border-radius:4px;background:#f59e0b;"></div><div style="width:18px;height:18px;border-radius:4px;background:#10b981;"></div><div style="width:18px;height:18px;border-radius:4px;background:#3b82f6;"></div><div style="width:18px;height:18px;border-radius:4px;background:#ef4444;"></div></div><div style="font-size:15px;font-weight:700;color:#fff;">All</div><div style="font-size:11px;color:#555;">Every subject</div></div>`;
        } else {
            card.innerHTML = `<div class="card-bg-img" style="background-image:url('${s.bg}')"></div><div class="card-gradient"></div><div class="card-idle-content"><div class="card-emoji">${s.emoji}</div><div class="card-title">${s.label}</div></div><div class="card-hover-content"><div class="card-hover-emoji">${s.emoji}</div><div class="card-hover-title">${s.label}</div><div class="card-hover-desc">${s.desc}</div></div>`;
        }
        card.addEventListener('click', () => {
            activeSubject = s.id;
            renderSubjectCards();
            qid('sectionTitleText').textContent = s.id === 'all' ? 'Trending Now' : s.label;
            renderVideos(s.id === 'all' ? allVideos : allVideos.filter(v => v.subject === s.id));
        });
        row.appendChild(card);
    });
}

// ── Search ─────────────────────────────────────────────
let searchTimer;
qid('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const q = e.target.value.toLowerCase().trim();
        const pool = activeSubject === 'all' ? allVideos : allVideos.filter(v => v.subject === activeSubject);
        renderVideos(q ? pool.filter(v => (v.title||'').toLowerCase().includes(q) || (v.uploader_username||'').toLowerCase().includes(q)) : pool);
    }, 200);
});

// ── Auth ───────────────────────────────────────────────
function showLoggedIn(user) {
    currentUser = user;
    const name = displayName(user);
    const av = user.user_metadata?.avatar_url;
    const avHTML = av ? `<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">` : initials(name);
    qid('navRight').innerHTML = `
        <button class="btn btn-primary" id="openUploadBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:6px;vertical-align:middle;"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>
            Share Video
        </button>
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">${avHTML}</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="channel.html" class="dropdown-item">Your Channel</a>
                <a href="settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="logoutBtn">Log out</button>
            </div>
        </div>`;

    qid('openUploadBtn').addEventListener('click', openModal);
    qid('userAvatar').addEventListener('click', e => { e.stopPropagation(); qid('dropdownMenu').classList.toggle('show'); });
    if (!dropdownListenerSet) {
        document.addEventListener('click', () => qid('dropdownMenu')?.classList.remove('show'));
        dropdownListenerSet = true;
    }
    qid('dropdownMenu').addEventListener('click', e => e.stopPropagation());
    qid('logoutBtn').addEventListener('click', async () => {
        const { supabase } = await import('./JS/supabase.js');
        await supabase.auth.signOut();
    });
}
function showLoggedOut() {
    currentUser = null;
    qid('navRight').innerHTML = `<a href="login.html" class="btn btn-secondary">Log in</a><a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>`;
}

// ── Sidebar toggle ─────────────────────────────────────
function initSidebar() {
    const toggle = qid('sidebarToggle');
    const sidebar = qid('sidebar');
    toggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', e => {
        if (window.innerWidth <= 1024 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target))
            sidebar.classList.remove('open');
    });
    sidebar.addEventListener('click', e => e.stopPropagation());
    qid('scrollLeft').addEventListener('click', () => qid('subjectsRow').scrollBy({ left: -260, behavior: 'smooth' }));
    qid('scrollRight').addEventListener('click', () => qid('subjectsRow').scrollBy({ left: 260, behavior: 'smooth' }));
}

// ── Boot ───────────────────────────────────────────────
async function init() {
    try {
        const { supabase } = await import('./JS/supabase.js');
        const { data: { session } } = await supabase.auth.getSession();
        if (session) showLoggedIn(session.user); else showLoggedOut();
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) showLoggedIn(session.user);
            if (event === 'SIGNED_OUT') showLoggedOut();
        });
    } catch (e) { console.error(e); showLoggedOut(); }

    renderSubjectCards();
    renderSubjectPicker();
    initSidebar();
    loadVideos();
}

init();
</script>
</body>
</html>
