<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; overflow-x: hidden; }

.sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 240px; background: #131313; border-right: 1px solid #1f1f1f; padding: 20px 12px 20px; overflow-y: auto; z-index: 150; transition: transform 0.3s ease; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
.sidebar .logo { display: flex; align-items: center; gap: 10px; font-size: 34px; font-weight: 800; padding: 10px 12px; color: #ffffff; text-decoration: none; border-radius: 8px; margin-bottom: 12px; }
.sidebar .logo .logo-icon { width: 56px; height: 56px; border-radius: 8px; background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.sidebar .logo:hover { background: rgba(0, 31, 63, 0.09); }
.logo-icon { background: url('assets/hamico.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
.logo-icon::before { content: ''; }
.sidebar-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; color: #b0b0b0; text-decoration: none; border-radius: 8px; transition: all 0.2s; cursor: pointer; margin-bottom: 4px; }
.sidebar-item:hover { background: #1f1f1f; color: #ffffff; }
.sidebar-item.active { background: #001f3f; color: #ffffff; }
.sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-item-text { font-size: 14px; font-weight: 500; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section-title { padding: 8px 16px; font-size: 12px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-divider { height: 1px; background: #1f1f1f; margin: 12px 0; }

.navbar { background: #131313; padding: 9px 40px 9px 280px; display: flex; align-items: center; justify-content: flex-end; gap: 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1f1f1f; min-height: 70px; }
.search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; max-width: 700px; padding: 0 20px; }
.search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #6b6b6b; pointer-events: none; }
.search-input { width: 100%; padding: 10px 16px 10px 44px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; color: #ffffff; font-size: 14px; transition: all 0.2s; }
.search-input:focus { outline: none; border-color: #001f3f; background: #252525; }
.search-input::placeholder { color: #6b6b6b; }
.navbar::before { content: ''; flex: 1; }
.nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; position: relative; z-index: 10; }

.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.btn-secondary { background: transparent; color: #ffffff; border: 1px solid #3a3a3a; }
.btn-secondary:hover { background: #1f1f1f; }
.btn-primary { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); color: white; }
.btn-primary:hover { background: linear-gradient(135deg, #001f3f 0%, #000000 100%); transform: translateY(-1px); }
.btn-danger { background: transparent; color: #f87171; border: 1px solid #3a1a1a; }
.btn-danger:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }
.btn-danger-solid { background: #ef4444; color: white; border: none; }
.btn-danger-solid:hover { background: #dc2626; }
.btn-sm { padding: 8px 16px; font-size: 13px; }

.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; transition: transform 0.2s; overflow: hidden; }
.user-avatar:hover { transform: scale(1.05); }
.user-menu { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s; z-index: 1000; }
.dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown-item { padding: 12px 16px; color: #b0b0b0; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-size: 14px; }
.dropdown-item:hover { background: #2a2a2a; color: #ffffff; }
.dropdown-divider { height: 1px; background: #2a2a2a; margin: 4px 0; }

.main-content { margin-left: 240px; padding: 32px 40px; min-height: 100vh; }
.sidebar-toggle { background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; cursor: pointer; display: none; transition: all 0.2s; flex-shrink: 0; }
.sidebar-toggle:hover { background: #2a2a2a; }
.sidebar-toggle svg { width: 20px; height: 20px; color: #ffffff; }

/* Settings layout */
.settings-layout { display: flex; gap: 32px; max-width: 900px; }

.settings-nav { width: 200px; flex-shrink: 0; position: sticky; top: 94px; align-self: flex-start; }
.settings-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #7a7a7a; cursor: pointer; transition: all 0.2s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
.settings-nav-item:hover { background: #1a1a1a; color: #c0c0c0; }
.settings-nav-item.active { background: #1a1a1a; color: #ffffff; }
.settings-nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

.settings-content { flex: 1; min-width: 0; }

/* Section */
.settings-section { display: none; }
.settings-section.active { display: block; }

.section-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.section-sub { font-size: 14px; color: #5a5a5a; margin-bottom: 28px; }

/* Card */
.settings-card { background: #111111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 22px 24px; margin-bottom: 16px; }
.card-label { font-size: 13px; font-weight: 600; color: #9a9a9a; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 16px; }

/* Profile avatar */
.avatar-section { display: flex; align-items: center; gap: 20px; }
.settings-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #001f3f 0%, #000000 100%); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; transition: opacity 0.2s; }
.settings-avatar:hover { opacity: 0.85; }
.settings-avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; border-radius: 50%; }
.settings-avatar:hover .avatar-overlay { opacity: 1; }
.avatar-overlay svg { width: 22px; height: 22px; color: white; }
.avatar-info { flex: 1; }
.avatar-info-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.avatar-info-sub { font-size: 13px; color: #5a5a5a; margin-bottom: 12px; }

/* Input row */
.input-row { margin-bottom: 16px; }
.input-row:last-child { margin-bottom: 0; }
.input-label { font-size: 13px; font-weight: 500; color: #7a7a7a; margin-bottom: 6px; display: block; }
.settings-input { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #222; border-radius: 8px; color: #ffffff; font-size: 14px; transition: border-color 0.2s; }
.settings-input:focus { outline: none; border-color: #001f3f; background: #1e1e1e; }
.settings-input::placeholder { color: #3a3a3a; }
.settings-input:disabled { opacity: 0.4; cursor: not-allowed; }
.input-hint { font-size: 12px; color: #4a4a4a; margin-top: 5px; }

.card-footer { display: flex; justify-content: flex-end; margin-top: 18px; padding-top: 16px; border-top: 1px solid #1a1a1a; }

/* Danger zone */
.danger-card { background: #110808; border: 1px solid #2a1010; border-radius: 12px; padding: 22px 24px; margin-bottom: 16px; }
.danger-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.danger-info-title { font-size: 14px; font-weight: 600; color: #f0f0f0; margin-bottom: 3px; }
.danger-info-sub { font-size: 13px; color: #6a3a3a; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: #141414; border: 1px solid #1f1f1f; border-radius: 14px; padding: 28px; width: 100%; max-width: 440px; margin: 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal-sub { font-size: 14px; color: #6b6b6b; margin-bottom: 22px; line-height: 1.5; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-input { width: 100%; padding: 10px 14px; background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 20px; }
.modal-input:focus { outline: none; border-color: #001f3f; }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1f1f1f; border: 1px solid #2a2a2a; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap; }
.toast.error { background: #1a0808; border-color: #3a1010; }

/* Auth gate */
.auth-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; gap: 16px; }
.auth-gate svg { width: 52px; height: 52px; color: #2a2a2a; }
.auth-gate-title { font-size: 18px; font-weight: 600; color: #7a7a7a; }
.auth-gate-sub { font-size: 14px; color: #4a4a4a; }

/* Responsive */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .main-content { margin-left: 0; padding: 20px; }
    .navbar { padding: 16px 20px; justify-content: flex-start; gap: 12px; }
    .search-container { position: relative; left: auto; transform: none; flex: 1; max-width: none; padding: 0; margin-left: 0; }
    .search-icon { left: 16px; }
    .navbar::before { display: none; }
    .settings-layout { flex-direction: column; gap: 20px; }
    .settings-nav { width: 100%; position: static; display: flex; gap: 4px; flex-wrap: wrap; }
    .settings-nav-item { flex: none; padding: 8px 14px; }
}
@media (max-width: 640px) {
    .main-content { padding: 12px 16px; }
    .navbar { padding: 12px 16px; }
}
</style>

<script type="module">
const { supabase } = await import('./JS/supabase.js');

let currentUser = null;
let currentProfile = null;

// ── Helpers ───────────────────────────────────────────────────
function getUserInitials(text) { return text?.trim().charAt(0).toUpperCase() || 'U'; }
function getDisplayName(user) {
    if (user.user_metadata?.full_name) return user.user_metadata.full_name;
    if (user.user_metadata?.name) return user.user_metadata.name;
    if (user.email) { const n = user.email.split('@')[0]; return n.charAt(0).toUpperCase() + n.slice(1); }
    return 'User';
}

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── Nav ───────────────────────────────────────────────────────
function showLoggedInNav(user) {
    const navRight = document.getElementById('navRight');
    const displayName = getDisplayName(user);
    const avatarUrl = user.user_metadata?.avatar_url;
    const avatarHTML = avatarUrl
        ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : getUserInitials(displayName);
    navRight.innerHTML = `
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">${avatarHTML}</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="channel.html" class="dropdown-item">Your Channel</a>
                <a href="settings.html" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="logoutBtn">Log out</button>
            </div>
        </div>`;
    document.getElementById('userAvatar')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('dropdownMenu').classList.toggle('show'); });
    document.addEventListener('click', () => document.getElementById('dropdownMenu')?.classList.remove('show'));
    document.getElementById('dropdownMenu')?.addEventListener('click', e => e.stopPropagation());
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; });
}

function showLoggedOutNav() {
    document.getElementById('navRight').innerHTML = `<a href="login.html" class="btn btn-secondary">Log in</a><a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>`;
}

// ── Sidebar ───────────────────────────────────────────────────
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebar = document.getElementById('sidebar');
if (sidebarToggle) {
    sidebarToggle.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', e => { if (window.innerWidth <= 1024 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) sidebar.classList.remove('open'); });
    sidebar.addEventListener('click', e => e.stopPropagation());
}

// ── Render settings ───────────────────────────────────────────
function renderSettings(profile) {
    const avatarUrl = profile?.avatar_url || currentUser?.user_metadata?.avatar_url;
    const username = profile?.username || getDisplayName(currentUser);
    const email = currentUser.email || '';
    const initial = getUserInitials(username);

    const avatarContent = avatarUrl
        ? `<img src="${avatarUrl}" alt="avatar">`
        : initial;

    document.getElementById('settingsRoot').innerHTML = `
        <div style="margin-bottom:28px;">
            <h1 style="font-size:24px;font-weight:700;">Settings</h1>
            <p style="font-size:14px;color:#5a5a5a;margin-top:4px;">Manage your account and preferences.</p>
        </div>

        <div class="settings-layout">
            <!-- Side nav -->
            <nav class="settings-nav">
                <button class="settings-nav-item active" data-section="profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </button>
                <button class="settings-nav-item" data-section="account">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Account
                </button>
                <button class="settings-nav-item" data-section="privacy">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Privacy
                </button>
                <button class="settings-nav-item" data-section="danger">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Danger zone
                </button>
            </nav>

            <!-- Sections -->
            <div class="settings-content">

                <!-- Profile -->
                <div class="settings-section active" id="section-profile">
                    <div class="section-title">Profile</div>
                    <div class="section-sub">Update your public profile information.</div>

                    <div class="settings-card">
                        <div class="card-label">Profile picture</div>
                        <div class="avatar-section">
                            <div class="settings-avatar" id="settingsAvatar" title="Click to change photo">
                                ${avatarContent}
                                <div class="avatar-overlay">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                </div>
                            </div>
                            <div class="avatar-info">
                                <div class="avatar-info-title">Profile photo</div>
                                <div class="avatar-info-sub">JPG, PNG or GIF · Max 5MB</div>
                                <button class="btn btn-secondary btn-sm" id="changeAvatarBtn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                    Upload photo
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <div class="card-label">Display name</div>
                        <div class="input-row">
                            <label class="input-label">Username</label>
                            <input type="text" class="settings-input" id="usernameInput" value="${username}" maxlength="50" placeholder="Your channel name">
                            <div class="input-hint">This is your public name shown on your channel and videos.</div>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-primary btn-sm" id="saveUsernameBtn">Save username</button>
                        </div>
                    </div>
                </div>

                <!-- Account -->
                <div class="settings-section" id="section-account">
                    <div class="section-title">Account</div>
                    <div class="section-sub">Manage your login credentials.</div>

                    <div class="settings-card">
                        <div class="card-label">Email address</div>
                        <div class="input-row">
                            <label class="input-label">Current email</label>
                            <input type="email" class="settings-input" value="${email}" disabled>
                            <div class="input-hint">Email changes are not currently supported.</div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <div class="card-label">Change password</div>
                        <div class="input-row">
                            <label class="input-label">New password</label>
                            <input type="password" class="settings-input" id="newPasswordInput" placeholder="Enter new password" autocomplete="new-password">
                        </div>
                        <div class="input-row">
                            <label class="input-label">Confirm new password</label>
                            <input type="password" class="settings-input" id="confirmPasswordInput" placeholder="Confirm new password" autocomplete="new-password">
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-primary btn-sm" id="savePasswordBtn">Update password</button>
                        </div>
                    </div>
                </div>

                <!-- Privacy -->
                <div class="settings-section" id="section-privacy">
                    <div class="section-title">Privacy</div>
                    <div class="section-sub">Control your data and activity.</div>

                    <div class="settings-card">
                        <div class="card-label">Watch history</div>
                        <div class="danger-row">
                            <div>
                                <div class="avatar-info-title">Clear watch history</div>
                                <div style="font-size:13px;color:#5a5a5a;margin-top:2px;">Remove all videos from your watch history. This cannot be undone.</div>
                            </div>
                            <button class="btn btn-danger btn-sm" id="clearHistoryBtn">Clear history</button>
                        </div>
                    </div>
                </div>

                <!-- Danger zone -->
                <div class="settings-section" id="section-danger">
                    <div class="section-title">Danger zone</div>
                    <div class="section-sub">Irreversible actions — proceed with caution.</div>

                    <div class="danger-card">
                        <div class="danger-row">
                            <div>
                                <div class="danger-info-title">Delete account</div>
                                <div class="danger-info-sub">Permanently delete your account and all associated data.</div>
                            </div>
                            <button class="btn btn-danger btn-sm" id="deleteAccountBtn">Delete account</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    `;

    attachListeners();
}

// ── Attach all listeners ──────────────────────────────────────
function attachListeners() {
    // Section nav
    document.querySelectorAll('.settings-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.settings-nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-' + btn.dataset.section).classList.add('active');
        });
    });

    // Avatar click
    document.getElementById('settingsAvatar')?.addEventListener('click', () => document.getElementById('avatarFileInput').click());
    document.getElementById('changeAvatarBtn')?.addEventListener('click', () => document.getElementById('avatarFileInput').click());

    // Save username
    document.getElementById('saveUsernameBtn')?.addEventListener('click', saveUsername);

    // Save password
    document.getElementById('savePasswordBtn')?.addEventListener('click', savePassword);

    // Clear history
    document.getElementById('clearHistoryBtn')?.addEventListener('click', clearHistory);

    // Delete account
    document.getElementById('deleteAccountBtn')?.addEventListener('click', () => {
        document.getElementById('deleteAccountModal').classList.add('show');
        document.getElementById('deleteConfirmInput').value = '';
        document.getElementById('confirmDeleteAccountBtn').disabled = true;
    });
}

// ── Avatar upload ─────────────────────────────────────────────
document.getElementById('avatarFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB', true); return; }

    showToast('Uploading...');
    const ext = file.name.split('.').pop();
    const path = `avatars/${currentUser.id}.${ext}`;

    const { error: uploadError } = await supabase.storage.from('avatars').upload(path, file, { upsert: true });
    if (uploadError) { showToast('Upload failed: ' + uploadError.message, true); return; }

    const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path);

    await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
    await supabase.from('videos').update({ uploader_avatar: publicUrl }).eq('user_id', currentUser.id);

    // Update preview
    const avatarEl = document.getElementById('settingsAvatar');
    if (avatarEl) {
        avatarEl.innerHTML = `<img src="${publicUrl}" alt="avatar"><div class="avatar-overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></div>`;
    }

    // Update nav avatar too
    showLoggedInNav({ ...currentUser, user_metadata: { ...currentUser.user_metadata, avatar_url: publicUrl } });
    showToast('Profile photo updated!');
    e.target.value = '';
});

// ── Save username ─────────────────────────────────────────────
async function saveUsername() {
    const newName = document.getElementById('usernameInput')?.value.trim();
    if (!newName) { showToast('Username cannot be empty', true); return; }

    const btn = document.getElementById('saveUsernameBtn');
    btn.textContent = 'Saving...'; btn.disabled = true;

    const { error } = await supabase.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    await supabase.from('videos').update({ uploader_username: newName }).eq('user_id', currentUser.id);

    btn.textContent = 'Save username'; btn.disabled = false;

    if (error) { showToast('Failed to update username', true); return; }
    currentProfile = { ...currentProfile, username: newName };
    showToast('Username updated!');
}

// ── Save password ─────────────────────────────────────────────
async function savePassword() {
    const newPass = document.getElementById('newPasswordInput')?.value;
    const confirmPass = document.getElementById('confirmPasswordInput')?.value;

    if (!newPass) { showToast('Enter a new password', true); return; }
    if (newPass.length < 6) { showToast('Password must be at least 6 characters', true); return; }
    if (newPass !== confirmPass) { showToast('Passwords do not match', true); return; }

    const btn = document.getElementById('savePasswordBtn');
    btn.textContent = 'Updating...'; btn.disabled = true;

    const { error } = await supabase.auth.updateUser({ password: newPass });

    btn.textContent = 'Update password'; btn.disabled = false;

    if (error) { showToast('Failed to update password: ' + error.message, true); return; }
    document.getElementById('newPasswordInput').value = '';
    document.getElementById('confirmPasswordInput').value = '';
    showToast('Password updated!');
}

// ── Clear history ─────────────────────────────────────────────
async function clearHistory() {
    if (!confirm('Clear your entire watch history? This cannot be undone.')) return;
    const { error } = await supabase.from('watch_history').delete().eq('user_id', currentUser.id);
    if (error) { showToast('Failed to clear history', true); return; }
    showToast('Watch history cleared.');
}

// ── Delete account modal ──────────────────────────────────────
document.getElementById('deleteConfirmInput').addEventListener('input', e => {
    document.getElementById('confirmDeleteAccountBtn').disabled = e.target.value !== 'DELETE';
});

document.getElementById('cancelDeleteAccountBtn').addEventListener('click', () => {
    document.getElementById('deleteAccountModal').classList.remove('show');
});

document.getElementById('deleteAccountModal').addEventListener('click', e => {
    if (e.target.id === 'deleteAccountModal') document.getElementById('deleteAccountModal').classList.remove('show');
});

document.getElementById('confirmDeleteAccountBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteAccountBtn');
    btn.textContent = 'Deleting...'; btn.disabled = true;

    // Delete user data
    await supabase.from('watch_history').delete().eq('user_id', currentUser.id);
    await supabase.from('video_likes').delete().eq('user_id', currentUser.id);
    await supabase.from('subscriptions').delete().eq('subscriber_id', currentUser.id);
    await supabase.from('comments').delete().eq('user_id', currentUser.id);
    await supabase.from('videos').delete().eq('user_id', currentUser.id);
    await supabase.from('profiles').delete().eq('id', currentUser.id);

    await supabase.auth.signOut();
    window.location.href = 'index.html';
});

// ── Init ──────────────────────────────────────────────────────
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user || null;

    if (!currentUser) {
        showLoggedOutNav();
        document.getElementById('settingsRoot').innerHTML = `
            <div class="auth-gate">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <div class="auth-gate-title">Sign in to access settings</div>
                <div class="auth-gate-sub">You need to be logged in to manage your account.</div>
                <div style="display:flex;gap:12px;margin-top:8px;">
                    <a href="login.html" class="btn btn-secondary">Log in</a>
                    <a href="login.html?mode=signup" class="btn btn-primary">Sign up</a>
                </div>
            </div>`;
        return;
    }

    showLoggedInNav(currentUser);

    // Load profile
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    currentProfile = profile || { id: currentUser.id, username: getDisplayName(currentUser), avatar_url: null };

    renderSettings(currentProfile);
}

init();
</script>
</body>
